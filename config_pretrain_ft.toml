[paths]
data_root = "/rhf/dk77/data/raw"
ckpt_dir = "checkpoints/pretrain_ft"

[pretrain]
backbone = "resnet50"
epochs = 100
warmup_epochs = 10
batch_size = 64
lr = 0.3
temperature = 0.5
proj_hidden = 2048
proj_out = 128
img_size = 256
use_amp = true
save_every = 10
workers = 4
prefetch_factor = 4
pbar_refresh_every = 20
log_aug_every = 0

[finetune]
backbone = "resnet50"
backbone_ckpt = "checkpoints/simclr_final.pth"
img_size = 256
dropout = 0.3
probe_epochs = 10
epochs = 200
batch_size = 64
backbone_lr = 0.0001
head_lr = 0.001
weight_decay = 0.0001
label_smoothing = 0.1
mixup_alpha = 0.2
warmup_epochs = 5
val_split = 0.1
folds = 5
patience = 20
workers = 6

[etl]
competition = "elec-378-sp-26-final-project"
output_dir = "etl/raw"
